<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест | WAYLYRA</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="test-page">

    <section class="test-card">

        <div class="test-top">
            <a href="stress-test.html" class="back-link">←</a>

            <div class="progress-bar">
                <div class="progress-fill gender-step"></div>
            </div>
        </div>

        <h1>Якої ви статі?</h1>

        <form class="test-options">

            <label class="test-option">
                <span>👩 Жіночої</span>
                <input type="radio" name="gender" value="female">
            </label>

            <label class="test-option">
                <span>👨 Чоловічої</span>
                <input type="radio" name="gender" value="male">
            </label>

            <label class="test-option">
                <span>🕶️ Не хочу вказувати</span>
                <input type="radio" name="gender" value="private">
            </label>

        </form>

        <a href="age-test.html" class="test-next-btn">
            Далі
        </a>

    </section>

</body>
</html>
