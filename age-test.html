<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест | WAYLYRA</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="test-page">

    <section class="test-card">

        <div class="test-top">
            <a href="gender-test.html" class="back-link">←</a>

            <div class="progress-bar">
                <div class="progress-fill age-step"></div>
            </div>
        </div>

        <h1>Якого ви віку?</h1>

        <form class="test-options">

            <label class="test-option">
                <span>18–24</span>
                <input type="radio" name="age">
            </label>

            <label class="test-option">
                <span>25–34</span>
                <input type="radio" name="age">
            </label>

            <label class="test-option">
                <span>35–44</span>
                <input type="radio" name="age">
            </label>

            <label class="test-option">
                <span>45–54</span>
                <input type="radio" name="age">
            </label>

            <label class="test-option">
                <span>55+</span>
                <input type="radio" name="age">
            </label>

            <label class="test-option">
                <span>Не хочу вказувати</span>
                <input type="radio" name="age">
            </label>

        </form>

        <a href="status-test.html" class="test-next-btn">
            Далі
        </a>

    </section>

</body>
</html>
