<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест | WAYLYRA</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="test-page">

    <section class="test-card">

        <div class="test-top">
            <a href="age-test.html" class="back-link">←</a>

            <div class="progress-bar">
                <div class="progress-fill status-step"></div>
            </div>
        </div>

        <h1>Який у вас сімейний статус?</h1>

        <form class="test-options">

            <label class="test-option">
                <span>Не в стосунках</span>
                <input type="radio" name="status">
            </label>

            <label class="test-option">
                <span>У стосунках</span>
                <input type="radio" name="status">
            </label>

            <label class="test-option">
                <span>Одружений / Одружена</span>
                <input type="radio" name="status">
            </label>

            <label class="test-option">
                <span>Розлучений / Розлучена</span>
                <input type="radio" name="status">
            </label>

            <label class="test-option">
                <span>Вдівець / Вдова</span>
                <input type="radio" name="status">
            </label>

            <label class="test-option">
                <span>Не хочу вказувати</span>
                <input type="radio" name="status">
            </label>

        </form>

        <a href="format-test.html" class="test-next-btn">
            Далі
        </a>

    </section>

</body>
</html>
