<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | WAYLYRA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <section class="auth-card">

        <h1>Зареєструйтесь, щоб дізнатися більше</h1>

        <p class="auth-subtitle">
            Створіть обліковий запис і забронюйте свою першу консультацію.
        </p>

        <form class="auth-form">

            <label>
                Ваш email*
                <input type="email">
            </label>

            <label>
                Пароль*
                <input type="password">
            </label>

            <label>
                Телефон <span>(необов’язково)</span>
                <input type="tel">
            </label>

            <label class="checkbox-label">
                <input type="checkbox">
                <span>
                    Створюючи обліковий запис, ви погоджуєтеся з умовами
                    та політикою конфіденційності.
                </span>
            </label>

            <button class="auth-main-btn" type="sumbit">
                Зареєструватися
            </button>

        </form>

        <div class="divider">
            <span></span>
            <p>або</p>
            <span></span>
        </div>

        <div class="social-auth">
            <button>Продовжити з Google</button>
            <button>Продовжити через Facebook</button>
            <button>Продовжити з Apple ID</button>
        </div>

        <p class="auth-switch">
            Вже маєте обліковий запис?
            <a href="#">Увійти</a>
        </p>

    </section>

</body>
</html>
