<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | WAYLYRA</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

    <section class="auth-card">

        <h1>Увійдіть у WAYLYRA</h1>

        <p class="auth-subtitle">
            Продовжуйте роботу зі своїм спеціалістом
            та керуйте записами на консультації.
        </p>

        <form class="auth-form">

            <label>
                Ваш email*
                <input type="email">
            </label>

            <label>
                Пароль*
                <input type="password">
            </label>

            <a href="#" class="forgot-password">
                Забули пароль?
            </a>

            <button class="auth-main-btn" type="submit">
                Увійти
            </button>

        </form>

        <div class="divider">
            <span></span>
            <p>або</p>
            <span></span>
        </div>

        <div class="social-auth">
            <button>Продовжити з Google</button>
            <button>Продовжити через Facebook</button>
            <button>Продовжити з Apple ID</button>
        </div>

        <p class="auth-switch">
            Ще не маєте облікового запису?
            <a href="register.html">
                Зареєструватися
            </a>
        </p>

    </section>

</body>
</html>
